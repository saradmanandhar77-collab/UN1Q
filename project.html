<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Programming Language Table</title>
<style>
  body { font-family: Georgia, serif; text-align: center; }
  h2 { font-weight: bold; }
  table {
    border-collapse: collapse;
    margin: 20px auto;
    font-size: 18px;
  }
  th, td {
    border: 2px solid black;
    padding: 10px 25px;
  }
  th {
    font-size: 20px;
  }
</style>
</head>
<body>

<h2>Programming Language</h2>

<table>
  <tr>
    <th colspan="2">Language and Frameworks</th>
  </tr>
  <tr>
    <td>Python</td>
    <td>Django</td>
  </tr>
  <tr>
    <td rowspan="2">Javascript</td>
    <td>React.js</td>
  </tr>
  <tr>
    <td>Vue.js</td>
  </tr>
  <tr>
    <td>Ruby</td>
    <td>Ruby on Rails</td>
  </tr>
</table>

</body>
</html>
